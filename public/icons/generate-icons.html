<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { background: #333; color: white; font-family: Arial; padding: 20px; }
    .icon-container { display: inline-block; margin: 10px; text-align: center; }
    canvas { border: 1px solid #555; }
  </style>
</head>
<body>
  <h1>StellaFlix Icon Generator</h1>
  <p>Right-click on each icon to save as PNG</p>

  <div id="icons"></div>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    const container = document.getElementById('icons');

    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-container';

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 绘制背景
      const radius = size * 0.195;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = '#dc2626';
      ctx.fill();

      // 绘制播放按钮
      ctx.beginPath();
      const scaleX = size / 512;
      const scaleY = size / 512;
      ctx.moveTo(180 * scaleX, 140 * scaleY);
      ctx.lineTo(380 * scaleX, 256 * scaleY);
      ctx.lineTo(180 * scaleX, 372 * scaleY);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      ctx.fill();

      // 绘制星星
      ctx.beginPath();
      ctx.arc(400 * scaleX, 120 * scaleY, 8 * scaleX, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.fill();

      div.appendChild(canvas);

      const label = document.createElement('p');
      label.textContent = `${size}x${size}`;
      div.appendChild(label);

      container.appendChild(div);
    });
  </script>
</body>
</html>
